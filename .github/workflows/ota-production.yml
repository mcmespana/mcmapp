# .github/workflows/ota-production.yml
name: OTA Production

on:
  push:
    branches: [production]
  workflow_dispatch:

concurrency:
  group: ota-production
  cancel-in-progress: false

jobs:
  publish-prod:
    # Salta si el mensaje del commit contiene [skip-ota] (p.ej. cuando se añaden paquetes nativos)
    # En workflow_dispatch siempre corre (el usuario lo lanzó explícitamente)
    if: |
      github.event_name == 'workflow_dispatch' ||
      !contains(github.event.head_commit.message, '[skip-ota]')
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }} # yamllint disable-line
      EXPO_PUBLIC_FIREBASE_API_KEY: ${{ secrets.EXPO_PUBLIC_FIREBASE_API_KEY }}
      EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN }}
      EXPO_PUBLIC_FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
      EXPO_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_PROJECT_ID }}
      EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET }}
      EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
      EXPO_PUBLIC_FIREBASE_APP_ID: ${{ secrets.EXPO_PUBLIC_FIREBASE_APP_ID }}
      EXPO_PUBLIC_CORS_PROXY_URL: ${{ secrets.EXPO_PUBLIC_CORS_PROXY_URL }}
      # Client IDs de Google Sign-In: deben ir también en la OTA porque las
      # variables EXPO_PUBLIC_* se hornean en el bundle JS. Sin esto, cada OTA
      # dejaba el login nativo con client IDs = undefined y no abría (no son
      # secretos: van embebidos en la app igualmente).
      EXPO_PUBLIC_GOOGLE_IOS_CLIENT_ID: 333436090762-mimunbdpp07nv2hr8mvc2u52ncgrlsr3.apps.googleusercontent.com
      EXPO_PUBLIC_GOOGLE_WEB_CLIENT_ID: 333436090762-tl5ltg6f1ad7lrqtbs3jq3ae2uu3v0sr.apps.googleusercontent.com
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mcm-app/package-lock.json

      - name: Verificar que EXPO_TOKEN existe
        run: |
          if [ -z "${EXPO_TOKEN}" ]; then
            echo "::error::EXPO_TOKEN no está configurado en los secrets del repositorio"
            exit 1
          fi

      - name: Instalar EAS CLI
        run: npm install -g eas-cli@latest

      - name: Instalar dependencias
        working-directory: ./mcm-app
        run: npm ci

      - name: Verificar autenticación
        run: eas whoami

      - name: Preparar mensaje de update
        id: msg
        run: |
          COMMIT_MSG="$(git log -1 --pretty=%s)"
          # Truncamos a 200 chars para que quepa en EAS Update
          SHORT_MSG="${COMMIT_MSG:0:200}"
          echo "message=🚀 ${SHORT_MSG} (${GITHUB_SHA:0:7})" >> "$GITHUB_OUTPUT"

      - name: Publicar OTA en production
        working-directory: ./mcm-app
        run: |
          eas update \
            --branch production \
            --platform all \
            --message "${{ steps.msg.outputs.message }}" \
            --non-interactive
