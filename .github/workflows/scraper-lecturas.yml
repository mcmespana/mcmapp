name: Scraper Lecturas Diario

on:
  schedule:
    - cron: "10 0 * * *"   # 01:10h España invierno (CET  = UTC+1)
    - cron: "10 23 * * *"  # 01:10h España verano  (CEST = UTC+2)

  workflow_dispatch:
    inputs:
      date:
        description: "Fecha base (YYYY-MM-DD). Vacío = hoy en Europe/Madrid."
        required: false
        default: ""
      dry_run:
        description: "Dry-run: scraping sin escribir en Firebase"
        required: false
        type: boolean
        default: false
      backfill_dominicos:
        description: "Backfill Dominicos: procesa -30..+30 días ignorando skip_existing"
        required: false
        type: boolean
        default: false
      cleanup_only:
        description: "Solo limpiar fechas antiguas, sin scraping"
        required: false
        type: boolean
        default: false

jobs:
  check-time:
    name: Verificar hora España
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Comprobar que ya ha pasado la 1:00 en España
        id: check
        run: |
          SPAIN_HOUR=$(TZ='Europe/Madrid' date +%H)
          SPAIN_TZ=$(TZ='Europe/Madrid' date +%Z)
          SCHEDULE="${{ github.event.schedule }}"
          echo "Hora actual en España: $(TZ='Europe/Madrid' date '+%H:%M %Z')"
          echo "Cron disparado: ${SCHEDULE:-n/a}"

          # Las dos líneas de "on.schedule" están en UTC y ambas se disparan
          # TODOS los días del año (GitHub no entiende el cambio de hora), así
          # que cada día del calendario en España recibe dos disparos:
          #   - uno "correcto" sobre la 01:1x hora local (invierno o verano)
          #   - otro "sobrante", pensado para la otra estación, que cae fuera
          #     de temporada (p.ej. las 00:1x o las 02:1x locales)
          # Solo debe ejecutarse el disparo cuyo cron coincide con la
          # estación actual, y solo si ya ha pasado la 1:00 (para tolerar
          # retrasos de GitHub Actions sin exigir que sea exactamente la 1:xx).
          should_run=false
          if [ "${{ github.event_name }}" != "schedule" ]; then
            should_run=true
          elif [ "$SPAIN_HOUR" != "00" ]; then
            if { [ "$SCHEDULE" = "10 0 * * *" ] && [ "$SPAIN_TZ" = "CET" ]; } || \
               { [ "$SCHEDULE" = "10 23 * * *" ] && [ "$SPAIN_TZ" = "CEST" ]; }; then
              should_run=true
            fi
          fi

          NOW="$(TZ='Europe/Madrid' date '+%H:%M %Z')"

          if [ "$should_run" = "true" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Proceder con el scraper."
            {
              echo "### ▶️ Scraper Lecturas: procede"
              echo "Hora en España: $NOW. Disparo: ${{ github.event_name }} (cron ${SCHEDULE:-manual})."
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Disparo del cron fuera de temporada o antes de la 1:00, omitiendo."
            # ::notice:: para que el skip sea visible en la lista de checks del
            # run sin tener que abrir logs — es el comportamiento ESPERADO del
            # doble-cron (uno de los dos disparos diarios siempre cae fuera de
            # temporada), pero solo si el OTRO disparo del día sí procedió.
            echo "::notice title=Scraper Lecturas omitido::Fuera de temporada o antes de la 1:00 en España (hora: $NOW, cron: ${SCHEDULE:-n/a}). Esperado en el doble-cron diario — solo preocupante si NINGÚN disparo del día llega a ejecutar el scraper."
            {
              echo "### ⏭️ Scraper Lecturas: omitido"
              echo "Fuera de temporada o antes de la 1:00 en España (hora: $NOW, cron: ${SCHEDULE:-n/a})."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

  scrape:
    name: Scrape y guardar en Firebase
    runs-on: ubuntu-latest
    needs: check-time
    if: needs.check-time.outputs.should_run == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scraper-lecturas/requirements.txt

      - name: Instalar dependencias
        working-directory: scraper-lecturas
        run: pip install -r requirements.txt

      - name: Tests
        working-directory: scraper-lecturas
        run: |
          pip install -r requirements-dev.txt
          python -m pytest tests/ -q

      - name: Ejecutar scraper
        working-directory: scraper-lecturas
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
          INPUT_DATE: ${{ github.event.inputs.date }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          INPUT_BACKFILL: ${{ github.event.inputs.backfill_dominicos }}
          INPUT_CLEANUP_ONLY: ${{ github.event.inputs.cleanup_only }}
        run: |
          ARGS=""
          if [ -n "$INPUT_DATE" ]; then
            ARGS="$ARGS --date $INPUT_DATE"
          fi
          if [ "$INPUT_DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "$INPUT_BACKFILL" = "true" ]; then
            ARGS="$ARGS --backfill-dominicos"
          fi
          if [ "$INPUT_CLEANUP_ONLY" = "true" ]; then
            ARGS="$ARGS --cleanup-only"
          fi
          python main.py $ARGS

      - name: Resumen en caso de fallo
        if: failure()
        run: |
          echo "::error::El scraper de lecturas falló."
          echo "::error::Revisar logs. Si hay HTTP 403/429 en Dominicos, posible rate-limit."
          echo "::error::Si VidaNueva da 403, ver README.md en scraper-lecturas/."
          echo "::error::Para backfill manual: workflow_dispatch con backfill_dominicos=true."
