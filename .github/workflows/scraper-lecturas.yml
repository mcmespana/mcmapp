name: Scraper Lecturas Diario

on:
  schedule:
    - cron: "10 0 * * *"   # 01:10h España invierno (CET  = UTC+1)
    - cron: "10 23 * * *"  # 01:10h España verano  (CEST = UTC+2)

  workflow_dispatch:
    inputs:
      date:
        description: "Fecha base (YYYY-MM-DD). Vacío = hoy en Europe/Madrid."
        required: false
        default: ""
      dry_run:
        description: "Dry-run: scraping sin escribir en Firebase"
        required: false
        type: boolean
        default: false
      backfill_dominicos:
        description: "Backfill Dominicos: procesa -30..+30 días ignorando skip_existing"
        required: false
        type: boolean
        default: false
      cleanup_only:
        description: "Solo limpiar fechas antiguas, sin scraping"
        required: false
        type: boolean
        default: false

jobs:
  check-time:
    name: Verificar hora España
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Comprobar que es la 1:xx en España
        id: check
        run: |
          SPAIN_HOUR=$(TZ='Europe/Madrid' date +%H)
          echo "Hora actual en España: $(TZ='Europe/Madrid' date '+%H:%M %Z')"
          if [ "${{ github.event_name }}" != "schedule" ] || [ "$SPAIN_HOUR" = "01" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "Proceder con el scraper."
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
            echo "Disparo del cron incorrecto para este horario, omitiendo."
          fi

  scrape:
    name: Scrape y guardar en Firebase
    runs-on: ubuntu-latest
    needs: check-time
    if: needs.check-time.outputs.should_run == 'true'
    timeout-minutes: 20

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: scrapping-lecturas/requirements.txt

      - name: Instalar dependencias
        working-directory: scrapping-lecturas
        run: pip install -r requirements.txt

      - name: Ejecutar scraper
        working-directory: scrapping-lecturas
        env:
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          FIREBASE_DATABASE_URL: ${{ secrets.EXPO_PUBLIC_FIREBASE_DATABASE_URL }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="$ARGS --date ${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.backfill_dominicos }}" = "true" ]; then
            ARGS="$ARGS --backfill-dominicos"
          fi
          if [ "${{ github.event.inputs.cleanup_only }}" = "true" ]; then
            ARGS="$ARGS --cleanup-only"
          fi
          python main.py $ARGS

      - name: Resumen en caso de fallo
        if: failure()
        run: |
          echo "::error::El scraper de lecturas falló."
          echo "::error::Revisar logs. Si hay HTTP 403/429 en Dominicos, posible rate-limit."
          echo "::error::Si VidaNueva da 403, ver README.md en scrapping-lecturas/."
          echo "::error::Para backfill manual: workflow_dispatch con backfill_dominicos=true."
